<svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 180 180">
  <!-- Background -->
  <rect width="180" height="180" fill="#0e0c0b"/>
  
  <!-- Subtle grid -->
  <line x1="0" y1="90" x2="180" y2="90" stroke="#2a2420" stroke-width="1"/>
  <line x1="90" y1="0" x2="90" y2="180" stroke="#2a2420" stroke-width="1"/>

  <!-- Outer ring -->
  <circle cx="90" cy="90" r="60" fill="none" stroke="#c1440e" stroke-width="2" opacity="0.6"/>

  <!-- Inner ring -->
  <circle cx="90" cy="90" r="38" fill="none" stroke="#e05c1a" stroke-width="1.5"/>

  <!-- Innermost ring -->
  <circle cx="90" cy="90" r="14" fill="none" stroke="#c1440e" stroke-width="1.5"/>

  <!-- Center dot -->
  <circle cx="90" cy="90" r="4" fill="#e05c1a"/>

  <!-- Top tick - outer gap -->
  <line x1="90" y1="20" x2="90" y2="46" stroke="#c1440e" stroke-width="2"/>
  <!-- Top tick - inner gap -->
  <line x1="90" y1="56" x2="90" y2="72" stroke="#e05c1a" stroke-width="1.5"/>

  <!-- Bottom tick - inner gap -->
  <line x1="90" y1="108" x2="90" y2="124" stroke="#e05c1a" stroke-width="1.5"/>
  <!-- Bottom tick - outer gap -->
  <line x1="90" y1="134" x2="90" y2="160" stroke="#c1440e" stroke-width="2"/>

  <!-- Left tick - outer gap -->
  <line x1="20" y1="90" x2="46" y2="90" stroke="#c1440e" stroke-width="2"/>
  <!-- Left tick - inner gap -->
  <line x1="56" y1="90" x2="72" y2="90" stroke="#e05c1a" stroke-width="1.5"/>

  <!-- Right tick - inner gap -->
  <line x1="108" y1="90" x2="124" y2="90" stroke="#e05c1a" stroke-width="1.5"/>
  <!-- Right tick - outer gap -->
  <line x1="134" y1="90" x2="160" y2="90" stroke="#c1440e" stroke-width="2"/>

  <!-- Corner brackets TL -->
  <path d="M 18 35 L 18 18 L 35 18" fill="none" stroke="#e05c1a" stroke-width="2"/>
  <!-- Corner brackets TR -->
  <path d="M 145 18 L 162 18 L 162 35" fill="none" stroke="#e05c1a" stroke-width="2"/>
  <!-- Corner brackets BL -->
  <path d="M 18 145 L 18 162 L 35 162" fill="none" stroke="#e05c1a" stroke-width="2"/>
  <!-- Corner brackets BR -->
  <path d="M 145 162 L 162 162 L 162 145" fill="none" stroke="#e05c1a" stroke-width="2"/>

  <!-- Glow effect on center -->
  <circle cx="90" cy="90" r="14" fill="none" stroke="#e05c1a" stroke-width="3" opacity="0.2"/>
  <circle cx="90" cy="90" r="4" fill="#ff7030" opacity="0.6"/>
</svg>
